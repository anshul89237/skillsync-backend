# ===============================
# 🌐 API GATEWAY CONFIG
# ===============================
spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.enabled=true
management.zipkin.tracing.connect-timeout=5s
management.zipkin.tracing.read-timeout=10s


management.endpoints.web.base-path=/actuator

# Log file
logging.file.name=logs/app.log

# Log level
logging.level.root=INFO
logging.level.org.springframework=INFO

# ===============================
# 🔐 AUTH SERVICE ROUTE
# ===============================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[0].filters[1]=AddRequestHeader=X-Internal-Request,gateway

# ===============================
# ROUTES FOR ALL SERVICES
# ===============================
management.metrics.tags.application=${spring.application.name}


# enable detailed metrics
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.tomcat=true

# add application tag (already good in your case)
management.metrics.tags.application=${spring.application.name}

spring.cloud.gateway.routes[1].id=skill-service
spring.cloud.gateway.routes[1].uri=lb://SKILL-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/skill-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[1].filters[1]=AddRequestHeader=X-Internal-Request,gateway

spring.cloud.gateway.routes[2].id=learner-service
