# ===============================
# 🔑 OAUTH2 ROUTES (no StripPrefix — Spring Security handles these paths directly)
# ===============================
spring.cloud.gateway.routes[9].id=auth-service-oauth2-init
spring.cloud.gateway.routes[9].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/oauth2/**
spring.cloud.gateway.routes[9].filters[0]=AddRequestHeader=X-Internal-Request,gateway

spring.cloud.gateway.routes[10].id=auth-service-oauth2-callback
spring.cloud.gateway.routes[10].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/login/oauth2/**
spring.cloud.gateway.routes[10].filters[0]=AddRequestHeader=X-Internal-Request,gateway


# ===============================
# ⚙️ ACTUATOR (Optional but useful)
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

jwt.secret = ${JWT_SECRET}

# expose endpoints
management.endpoints.web.exposure.include=*

# enable prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# ===============================
# 🔹 SWAGGER (SPRINGDOC OPENAPI)
# ===============================

# ===============================
