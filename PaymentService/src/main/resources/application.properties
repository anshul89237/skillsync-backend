spring.application.name=payment-service
server.port=8090
spring.datasource.url=jdbc:postgresql://localhost:5432/skillsync-payments
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.main.allow-bean-definition-overriding=true
spring.config.import=optional:configserver:http://localhost:9999/config
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_dummy}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:rzp_test_dummy_secret}
