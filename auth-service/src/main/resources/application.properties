# ===============================
# 🚀 APPLICATION CONFIG
# ===============================
spring.application.name=AUTH-SERVICE
server.port=8081

# ===============================
# ☁️ CONFIG SERVER
# ===============================
spring.config.import=optional:configserver:http://localhost:9999/config

# ===============================
# 🗄️ DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/skillsync-users
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 🔐 JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh.expiration=604800000

# ===============================
# 🔑 GOOGLE OAUTH2 CONFIG
# ===============================
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope[0]=email
spring.security.oauth2.client.registration.google.scope[1]=profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/{registrationId}

# ===============================
# 📧 MAIL CONFIG
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=anshulkumar89237727@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true

# ===============================
# 📊 ACTUATOR & PROMETHEUS
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.enable.jvm=true
management.metrics.tags.application=${spring.application.name}

# ===============================
# 🔍 TRACING (ZIPKIN)
# ===============================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.zipkin.tracing.connect-timeout=5s
management.zipkin.tracing.read-timeout=10s

# ===============================
# 📝 LOGGING
# ===============================
logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.org.springframework=INFO