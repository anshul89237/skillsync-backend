name: Backend Deploy to EC2
on:
  push:
    branches: ["main"]
    paths:
      - "**"
      - ".github/workflows/backend-ec2-deploy.yml"
  workflow_dispatch:
jobs:
  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build all services with Maven
        run: mvn package -Dmaven.test.skip=true --no-transfer-progress

      - name: Ensure target directory exists on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            mkdir -p "${{ secrets.EC2_TARGET_PATH }}"
      - name: Upload backend files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "."
          target: "${{ secrets.EC2_TARGET_PATH }}"
          overwrite: true
      - name: Write .env file and start services on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e
            cd "${{ secrets.EC2_TARGET_PATH }}"
            cat > .env <<'ENVEOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            BACKEND_URL=https://3.233.239.63.nip.io
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            ENVEOF
            if docker compose version > /dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi
            $COMPOSE down || true
            $COMPOSE up -d --build \
              postgres rabbitmq eureka-server config-server api-gateway \
              auth-service learner-service mentor-service skill-service \
              session-service group-service review-service notification-service \
              payment-service
            echo "Waiting for postgres to be ready..."
            for i in $(seq 1 30); do
              docker exec postgres pg_isready -U postgres && break || sleep 3
            done
            for db in skillsync-auth skillsync-groups skillsync-learners skillsync-mentors \
                      skillsync-payments skillsync-reviews skillsync-sessions \
                      skillsync-skills skillsync-users; do
              docker exec postgres psql -U postgres -tc \
                "SELECT 'CREATE DATABASE \"$db\"' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$db') \gexec"
            done
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"