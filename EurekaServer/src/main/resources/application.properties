spring.application.name=EurekaServer

# Port configuration 
server.port=8761
 
# CRITICAL: Prevent Eureka from registering with itself 
# A standalone Eureka server must NOT act as a client to itself 
eureka.client.register-with-eureka=false 
eureka.client.fetch-registry=false 
 
# The URL of this Eureka instance (used by all client services) 
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/